<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Outlook 接码控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body class="min-h-screen bg-slate-50" x-data="app()" x-init="init()">
    <nav class="border-b border-slate-200 bg-white">
      <div class="mx-auto max-w-7xl px-6 py-4 lg:grid lg:grid-cols-[auto_minmax(280px,1fr)_auto] lg:items-center lg:gap-4">
        <div class="flex items-center gap-3">
          <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-teal-600">
            <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
          </div>
          <div>
            <h1 class="text-xl font-bold text-slate-900">Outlook 接码控制台</h1>
          </div>
        </div>

        <div class="mt-4 flex items-center gap-3 lg:mt-0 lg:justify-center">
          <div class="relative w-full max-w-xl" @click.outside="searchFocused = false">
            <input x-model="searchQuery"
                   @input="handleSearchInput()"
                   @focus="searchFocused = true"
                   @keydown.enter.prevent="searchResults[0] && selectSearchResult(searchResults[0])"
                   @keydown.escape.prevent="clearSearch()"
                   type="text"
                   placeholder="搜索账号"
                   class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-2.5 text-sm text-slate-900 outline-none transition focus:border-teal-500 focus:bg-white">
            <button x-show="searchQuery"
                    @click="clearSearch()"
                    class="absolute right-2 top-1/2 -translate-y-1/2 rounded-md px-2 py-1 text-xs text-slate-500 transition hover:bg-slate-200">
              清空
            </button>

            <div x-show="showSearchResults"
                 x-cloak
                 class="absolute left-0 right-0 top-[calc(100%+8px)] z-20 overflow-hidden rounded-xl border border-slate-200 bg-white shadow-xl">
              <template x-for="account in searchResults" :key="account.id">
                <button @mousedown.prevent="selectSearchResult(account)"
                        class="flex w-full items-center justify-between gap-3 border-b border-slate-100 px-4 py-3 text-left transition last:border-b-0 hover:bg-slate-50">
                  <div class="min-w-0">
                    <p class="truncate text-sm font-medium text-slate-900" x-text="account.email"></p>
                    <p class="mt-1 truncate text-xs text-slate-500" x-text="account.group_name || '未分组'"></p>
                  </div>
                  <span class="rounded-full px-2 py-1 text-xs font-semibold"
                        :class="getTagClass(account.tag)"
                        x-text="getTagLabel(account.tag)"></span>
                </button>
              </template>
            </div>

            <div x-show="showEmptySearchResults"
                 x-cloak
                 class="absolute left-0 right-0 top-[calc(100%+8px)] z-20 rounded-xl border border-slate-200 bg-white px-4 py-4 text-sm text-slate-500 shadow-xl">
              没有搜索到账号
            </div>
          </div>
          <button @click="createGroup()"
                  class="shrink-0 rounded-xl bg-teal-600 px-4 py-2.5 text-sm font-medium text-white transition hover:bg-teal-700">
            新建分组
          </button>
          <button @click="reloadAccounts()"
                  class="shrink-0 rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm font-medium text-slate-700 transition hover:bg-slate-50">
            刷新账号
          </button>
        </div>

        <div class="mt-4 flex items-center justify-end gap-2 lg:mt-0">
          <span class="rounded-full px-3 py-1.5 text-xs font-semibold"
                :class="streamClass"
                x-text="streamLabel"></span>
          <span class="rounded-full px-3 py-1.5 text-xs font-semibold"
                :class="{
                  'bg-green-100 text-green-700': state === 'idle',
                  'bg-yellow-100 text-yellow-700': state === 'listening',
                  'bg-slate-200 text-slate-700': state === 'stopped',
                  'bg-red-100 text-red-700': state === 'error'
                }"
                x-text="getStateLabel(state)"></span>
        </div>
      </div>
    </nav>

    <div class="mx-auto max-w-7xl px-6 py-6">
      <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
        <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
          <p class="text-sm text-slate-500">账号总数</p>
          <p class="mt-2 text-3xl font-bold text-slate-900" x-text="stats.total"></p>
        </div>
        <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
          <p class="text-sm text-slate-500">可用账号</p>
          <p class="mt-2 text-3xl font-bold text-emerald-600" x-text="stats.ready"></p>
        </div>
        <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
          <p class="text-sm text-slate-500">分组数量</p>
          <p class="mt-2 text-3xl font-bold text-teal-600" x-text="stats.groups"></p>
        </div>
      </div>
    </div>

    <div class="mx-auto max-w-7xl px-6 pb-8">
      <div class="grid grid-cols-1 gap-6 xl:grid-cols-12">
        <div class="xl:col-span-3">
          <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
            <div class="mb-4 flex items-center justify-between">
              <h2 class="text-lg font-semibold text-slate-900">分组</h2>
              <span class="text-xs text-slate-500" x-text="visibleGroups.length + ' 组'"></span>
            </div>

            <div class="max-h-[600px] space-y-2 overflow-y-auto pr-1">
              <template x-for="group in visibleGroups" :key="group.id">
                <div @dragover="allowGroupDrop(group.id, $event)"
                     @dragleave="leaveGroupDrop(group.id)"
                     @drop="handleGroupDrop(group.id, $event)"
                     class="rounded-lg border transition"
                     :class="{
                       'border-teal-500 bg-teal-50': selectedGroupId === group.id,
                       'border-sky-500 bg-sky-50': dragOverGroupId === group.id,
                       'border-slate-200 bg-slate-50 hover:border-slate-300': selectedGroupId !== group.id && dragOverGroupId !== group.id
                     }">
                  <div class="flex items-start justify-between gap-3 px-4 py-3">
                    <button @click="selectGroup(group.id)"
                            class="min-w-0 flex-1 text-left">
                      <div class="truncate font-medium text-slate-900" x-text="group.name"></div>
                      <div class="mt-1 text-sm text-slate-500" x-text="group.accounts.length + ' 个账号'"></div>
                    </button>
                    <div class="flex shrink-0 items-center gap-1">
                      <button @click.stop="renameGroup(group.id)"
                              class="rounded-md px-2 py-1 text-xs text-slate-500 transition hover:bg-white hover:text-slate-900">
                        改名
                      </button>
                      <button @click.stop="deleteGroup(group.id)"
                              class="rounded-md px-2 py-1 text-xs text-rose-500 transition hover:bg-white hover:text-rose-600">
                        删除
                      </button>
                    </div>
                  </div>
                </div>
              </template>

              <div x-show="!visibleGroups.length"
                   class="rounded-lg border border-dashed border-slate-300 px-4 py-6 text-center text-sm text-slate-500">
                没有匹配账号
              </div>
            </div>

            <div class="mt-4 space-y-1 border-t border-slate-200 pt-4 text-xs text-slate-500">
              <p class="truncate" :title="accountsRoot" x-text="'账号目录: ' + (accountsRoot ? accountsRoot.split(/[/\\]/).pop() : '-')"></p>
              <p x-text="'账号文件数: ' + accountsFiles.length"></p>
              <p class="truncate" :title="groupsFile" x-text="'分组文件: ' + (groupsFile ? groupsFile.split(/[/\\]/).pop() : '-')"></p>
            </div>
          </div>
        </div>

        <div class="xl:col-span-5">
          <div class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
            <div class="mb-4 flex items-start justify-between gap-4">
              <div>
                <h2 class="text-lg font-semibold text-slate-900">验证码</h2>
              </div>
              <button @click="copyCode()"
                      class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50">
                复制验证码
              </button>
            </div>

            <div x-show="mailAlertText"
                 class="mb-4 rounded-xl border border-amber-200 bg-amber-50 px-4 py-3">
              <div class="flex items-start justify-between gap-3">
                <div class="min-w-0">
                  <p class="text-sm font-semibold text-amber-900">新邮件已到达</p>
                  <p class="mt-1 break-words text-sm text-amber-800" x-text="mailAlertText"></p>
                  <p class="mt-1 text-xs text-amber-700" x-show="mailAlertAt" x-text="mailAlertAt"></p>
                </div>
                <button @click="mailAlertText = ''"
                        class="rounded-md px-2 py-1 text-xs font-medium text-amber-700 transition hover:bg-amber-100">
                  收起
                </button>
              </div>
            </div>

            <div class="mb-4 rounded-xl bg-slate-100 p-8 text-center">
              <div class="text-5xl font-bold tracking-widest text-slate-900" x-text="latestCode || '------'"></div>
              <p class="mt-3 text-sm text-slate-600" x-text="hintText"></p>
              <p class="mt-2 text-xs text-slate-500" x-show="latestMailSummary" x-text="latestMailSummary"></p>
              <p class="mt-2 text-xs text-slate-500" x-show="state === 'listening' && activeAccountId !== null">
                正在监听:
                <span class="font-medium" x-text="accounts.find(a => a.id === activeAccountId)?.email || '-'"></span>
              </p>
            </div>

            <div class="grid grid-cols-2 gap-3">
              <button @click="startListening()"
                      :disabled="!canStart"
                      class="rounded-lg bg-teal-600 px-4 py-3 font-medium text-white transition hover:bg-teal-700 disabled:cursor-not-allowed disabled:bg-slate-300">
                开始监听
              </button>
              <button @click="stopListening()"
                      :disabled="state !== 'listening'"
                      class="rounded-lg bg-slate-700 px-4 py-3 font-medium text-white transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:bg-slate-300">
                停止监听
              </button>
            </div>

            <div class="mt-6 border-t border-slate-200 pt-6" x-show="selectedAccount">
              <div class="mb-4 flex items-start justify-between gap-3">
                <div class="min-w-0">
                  <h3 class="truncate text-base font-semibold text-slate-900" x-text="selectedAccount?.email"></h3>
                  <p class="mt-1 text-sm text-slate-500">当前选中账号</p>
                </div>
                <span class="rounded-full px-2.5 py-1 text-xs font-semibold"
                      :class="getTagClass(selectedAccount?.tag)"
                      x-text="getTagLabel(selectedAccount?.tag)"></span>
              </div>

              <div class="space-y-3">
                <div class="rounded-lg bg-slate-50 p-3">
                  <p class="mb-1 text-xs text-slate-500">密码</p>
                  <code class="text-sm text-slate-900" x-text="passwordVisible ? selectedAccount?.password : '******'"></code>
                </div>

                <div class="grid grid-cols-3 gap-2">
                  <button @click="copyAccount()"
                          class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50">
                    复制账号
                  </button>
                  <button @click="togglePassword()"
                          class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50">
                    <span x-text="passwordVisible ? '隐藏密码' : '显示密码'"></span>
                  </button>
                  <button @click="copyPassword()"
                          class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50">
                    复制密码
                  </button>
                </div>

                <div class="rounded-lg bg-slate-50 p-3" x-show="selectedAccount?.note">
                  <p class="mb-1 text-xs text-slate-500">备注</p>
                  <p class="text-sm text-slate-700" x-text="selectedAccount?.note"></p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="xl:col-span-4">
          <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
            <div class="mb-4 flex items-center justify-between">
              <div>
                <h2 class="text-lg font-semibold text-slate-900" x-text="currentGroup?.name || '未选择分组'"></h2>
                <p class="text-sm text-slate-500" x-text="displayedAccounts.length + ' 个账号'"></p>
              </div>
              <span x-show="searchQuery"
                    class="rounded-full bg-slate-100 px-2 py-1 text-xs text-slate-600">
                搜索中
              </span>
            </div>

            <div class="max-h-[700px] space-y-3 overflow-y-auto pr-1">
              <template x-for="account in displayedAccounts" :key="account.id">
                <div @click="selectAccount(account.id)"
                     @dragstart="beginAccountDrag(account.email, $event)"
                     @dragend="endAccountDrag()"
                     draggable="true"
                     :data-account-id="account.id"
                     class="cursor-move rounded-xl border p-3 transition"
                     :class="{
                       'border-teal-500 bg-teal-50': selectedAccountId === account.id,
                       'border-yellow-500 bg-yellow-50': state === 'listening' && activeAccountId === account.id && selectedAccountId !== account.id,
                       'border-slate-200 bg-slate-50 hover:border-slate-300': selectedAccountId !== account.id && (state !== 'listening' || activeAccountId !== account.id)
                     }">
                  <div class="mb-3 flex items-start justify-between gap-3">
                    <div class="min-w-0 flex-1">
                      <p class="break-all text-sm font-medium text-slate-900" x-text="account.email"></p>
                    </div>
                    <div class="flex items-center gap-2">
                      <span class="whitespace-nowrap rounded-full px-2 py-0.5 text-xs font-semibold"
                            :class="account.ready && account.tag !== 'banned' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-600'"
                            x-text="account.ready && account.tag !== 'banned' ? '可用' : '不可用'"></span>
                      <span class="rounded-full bg-white px-2 py-0.5 text-[11px] font-medium text-slate-500 ring-1 ring-slate-200">
                        拖拽
                      </span>
                    </div>
                  </div>

                  <div class="flex flex-wrap items-center gap-2">
                    <div class="relative" @click.outside="tagMenuEmail = ''">
                      <button @click.stop="toggleTagMenu(account.email)"
                              class="rounded-full px-2.5 py-1 text-xs font-semibold transition hover:opacity-90"
                              :class="getTagClass(account.tag)"
                              x-text="getTagLabel(account.tag)"></button>

                      <div x-show="isTagMenuOpen(account.email)"
                           x-cloak
                           class="absolute left-0 top-[calc(100%+8px)] z-20 min-w-[112px] overflow-hidden rounded-xl border border-slate-200 bg-white shadow-xl">
                        <template x-for="option in availableTagOptions" :key="option.value">
                          <button @click.stop="setTag(account.email, option.value)"
                                  class="block w-full px-3 py-2 text-left text-xs text-slate-700 transition hover:bg-slate-50"
                                  x-text="option.label"></button>
                        </template>
                        <button @click.stop="createCustomTag(account.email)"
                                class="block w-full border-t border-slate-100 px-3 py-2 text-left text-xs font-medium text-violet-700 transition hover:bg-violet-50">
                          新建标记
                        </button>
                      </div>
                    </div>

                    <div class="relative" @click.outside="webUsageMenuEmail = ''">
                      <button @click.stop="toggleWebUsageMenu(account.email)"
                              class="rounded-full px-2.5 py-1 text-xs font-semibold transition hover:opacity-90"
                              :class="getWebUsageClass(account.web_usage)"
                              x-text="getWebUsageLabel(account.web_usage)"></button>

                      <div x-show="isWebUsageMenuOpen(account.email)"
                           x-cloak
                           class="absolute left-0 top-[calc(100%+8px)] z-20 min-w-[120px] overflow-hidden rounded-xl border border-slate-200 bg-white shadow-xl">
                        <template x-for="option in webUsageOptions" :key="option.value">
                          <button @click.stop="setWebUsage(account.email, option.value)"
                                  class="block w-full px-3 py-2 text-left text-xs text-slate-700 transition hover:bg-slate-50"
                                  x-text="option.label"></button>
                        </template>
                      </div>
                    </div>

                    <button @click.stop="editNote(account.email)"
                            class="rounded-lg border border-slate-300 bg-white px-2 py-1.5 text-xs font-medium text-slate-700 transition hover:bg-slate-100">
                      编辑备注
                    </button>

                    <span class="text-xs font-semibold text-amber-700"
                          x-show="state === 'listening' && activeAccountId === account.id">
                      监听中
                    </span>
                  </div>

                  <p class="mt-2 text-xs text-slate-500" x-show="account.note" x-text="account.note"></p>
                </div>
              </template>

              <div x-show="currentGroup && !displayedAccounts.length"
                   class="rounded-lg border border-dashed border-slate-300 px-4 py-8 text-center text-sm text-slate-500">
                当前分组没有账号
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
